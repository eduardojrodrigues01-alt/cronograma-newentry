// ── HISTÓRICO ────────────────────────────────
function logHistory(card, type, action) {
  if (!card.history) card.history = [];
  const now = new Date();
  card.history.unshift({
    type,
    action,
    author: currentUser || 'Usuário',
    date: now.toLocaleDateString('pt-BR'),
    time: now.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
  });
}

function showHistory(dateStr) {
  const day = getDay(dateStr);
  const allEvents = [];
  (day.cards||[]).forEach(card => {
    (card.history||[]).forEach(h => {
      allEvents.push({ ...h, cardTitle: card.title });
    });
  });
  // Ordenar por mais recente (já estão em ordem de inserção)
  let overlay = document.getElementById('historyOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'historyOverlay';
    overlay.className = 'history-overlay';
    overlay.innerHTML = `<div class="history-modal" id="historyModal"></div>`;
    overlay.addEventListener('click', e => { if(e.target===overlay) overlay.classList.remove('open'); });
    document.body.appendChild(overlay);
  }
  const iconMap = { create:'✨', edit:'✏️', approve:'✅', reject:'❌', delete:'🗑️', comment:'💬', file:'📎' };
  let itemsHtml = allEvents.length === 0
    ? `<div class="history-empty">Nenhuma atividade registrada ainda.</div>`
    : allEvents.map(h => `
      <div class="history-item">
        <div class="history-icon ${h.type}">${iconMap[h.type]||'•'}</div>
        <div class="history-content">
          <div class="history-action"><strong>${h.cardTitle}</strong> — ${h.action}</div>
          <div class="history-meta">${h.author} · ${h.date} às ${h.time}</div>
        </div>
      </div>`).join('');
  document.getElementById('historyModal').innerHTML = `
    <div class="history-modal-header">
      <div class="history-modal-title">📋 Histórico do dia</div>
      <button class="modal-close" onclick="document.getElementById('historyOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="history-list">${itemsHtml}</div>`;
  requestAnimationFrame(() => overlay.classList.add('open'));
}

// ── CARD ACTIONS ─────────────────────────────
function deleteCard(cardId) {
  const day = getDay(selectedDay);
  const card = day.cards.find(c=>c.id===cardId);
  if (card) logHistory(card, 'delete', `Excluiu o card`);
  // Guardar histórico no dia para não perder após remoção
  if (!day._deletedHistory) day._deletedHistory = [];
  if (card) day._deletedHistory.push(...(card.history||[]));
  day.cards = day.cards.filter(c => c.id !== cardId);
  renderModalBody(); renderCalendar();
  showToast('Card removido.');
}

function saveCaption(cardId) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  const el = document.getElementById(`caption-${cardId}`);
  if (card && el && el.value !== card.caption) {
    card.caption = el.value;
    if (el.value) logHistory(card, 'edit', `Alterou a legenda`);
    card.saved = false;
  }
}

function startCardRename(cardId) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  const el = document.getElementById(`ctitle-${cardId}`);
  if (!el) return;
  const input = document.createElement('input');
  input.className = 'campaign-title-input';
  input.value = card.title;
  input.onblur = () => {
    if(input.value.trim() && input.value.trim()!==card.title) {
      const oldTitle = card.title;
      card.title = input.value.trim();
      logHistory(card, 'edit', `Alterou o título de "${oldTitle}" para "${card.title}"`);
      card.saved = false;
    }
    renderModalBody(); renderCalendar();
  };
  input.onkeydown = e => { if(e.key==='Enter') input.blur(); if(e.key==='Escape'){renderModalBody();} };
  el.replaceWith(input); input.focus(); input.select();
}

function selectCardType(cardId, type) {
  selectedType = `card:${cardId}:${type}`;
  stagingItems = [];
  renderModalBody();
}

function handleCardFile(cardId, files) {
  const file = files[0]; if (!file) return;
  const ftype = file.type.startsWith('image')?'image':'video';
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  const ctype = selectedType?.split(':')[2] || ftype;
  const reader = new FileReader();
  reader.onload = e => {
    card.post = { type: ctype, name: file.name, src: e.target.result, emoji: ftype==='image'?'🖼️':'🎬', fileType: ftype };
    if (card.status==='empty') card.status='pending';
    logHistory(card, 'file', `Adicionou arquivo: ${file.name}`);
    card.saved = false;
    selectedType = null;
    renderModalBody(); renderCalendar(); showToast('📎 Arquivo adicionado!');
  };
  reader.readAsDataURL(file);
}

function saveCardCarousel(cardId) {
  if (stagingItems.length===0) return;
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  card.post = { type:'carousel', name:'Carrossel', src:null, emoji:'🎠', items: stagingItems.slice() };
  if (card.status==='empty') card.status='pending';
  stagingItems=[]; selectedType=null;
  renderModalBody(); renderCalendar(); showToast(`🎠 Carrossel salvo com ${card.post.items.length} itens!`);
}

function removeCardPost(cardId) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  logHistory(card, 'file', `Removeu o arquivo`);
  card.post = null; card.status='empty'; card.saved=false; selectedType=null;
  renderModalBody(); renderCalendar(); showToast('Post removido.');
}

function setCardStatus(cardId, status) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  if (card.status===status) {
    card.status='pending'; card.saved=false;
    renderModalBody(); renderCalendar(); showToast('⏳ Voltou para Aguardando.'); return;
  }
  card.status = status; card.saved = false;
  renderModalBody(); renderCalendar();
  showToast(status==='approved'?'✅ Marque como salvo quando confirmar.':'❌ Marque como salvo quando confirmar.');
}

async function sendCardComment(cardId) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  const el = document.getElementById(`comment-${cardId}`);
  if (!el?.value.trim()) return;
  const text = el.value.trim();
  const now = new Date();
  card.comments.push({ text, author:currentUser,
    date:now.toLocaleDateString('pt-BR'), time:now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) });
  logHistory(card, 'comment', `Enviou um comentário`);
  el.value='';
  renderModalBody(); showToast('💬 Comentário enviado!');
  // Salvar no Supabase em background
  if (card.db_id) await saveCommentToSupabase(card.db_id, text);
}

function deleteCardComment(cardId, idx) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  card.comments.splice(idx,1);
  renderModalBody(); showToast('Comentário excluído.');
}

function openCardPreview(cardId) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card?.post?.src) return;
  const p = card.post;
  previewItems = [{ src:p.src, name:p.name, fileType:p.fileType||p.type, emoji:p.emoji }];
  previewIdx = 0;
  const overlay = getOrCreatePreviewOverlay();
  renderPreviewItem(previewItems[0],0,1);
  requestAnimationFrame(()=>overlay.classList.add('open'));
}

function openCardCarouselPreview(cardId, startIdx) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card?.post?.items) return;
  previewItems = card.post.items;
  previewIdx = startIdx;
  const overlay = getOrCreatePreviewOverlay();
  renderPreviewItem(previewItems[previewIdx], previewIdx, previewItems.length);
  requestAnimationFrame(()=>overlay.classList.add('open'));
}

async function saveCard(cardId) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  const captionEl = document.getElementById(`caption-${cardId}`);
  if (captionEl) card.caption = captionEl.value;
  const statusLabel = { approved:'Aprovado', pending:'Aguardando', rejected:'Reprovado', empty:'Sem post' };
  if (!card.saved) {
    logHistory(card, card.status==='approved'?'approve':card.status==='rejected'?'reject':'edit',
      `Salvou o card (status: ${statusLabel[card.status]||card.status})`);
  }
  card.saved = true;
  showToast('💾 Salvando...');
  await saveCardToSupabase(card, selectedDay);
  renderModalBody(); renderCalendar();
  showToast('💾 Card salvo!');
}

function alterCard(cardId) {
  const card = getDay(selectedDay).cards.find(c=>c.id===cardId);
  if (!card) return;
  card.saved = false;
  renderModalBody();
}

function addEvent() {
  const input = document.getElementById('eventInput');
  const val = input.value.trim();
  if (!val) return;
  getDay(selectedDay).events.push(val);
  input.value = '';
  renderModalBody();
  renderCalendar();
  showToast('Data especial adicionada!');
}

function removeEvent(idx) {
  getDay(selectedDay).events.splice(idx, 1);
  renderModalBody();
  renderCalendar();
}

// selectType legacy — replaced by selectCardType


function handleFiles(files) {
  const toRead = Array.from(files);
  if (toRead.length === 0) return;
  const file = toRead[0];
  const fileType = file.type.startsWith('image') ? 'image' : file.type.startsWith('video') ? 'video' : 'doc';
  const postType = selectedType || fileType;
  const post = { id: uid(), name: file.name, type: postType, emoji: fileType==='image'?'🖼️':fileType==='video'?'🎬':'📄', caption: '', status: 'pending', comments: [], src: null };
  getDay(selectedDay).posts.push(post);
  if (fileType === 'image' || fileType === 'video') {
    const reader = new FileReader();
    reader.onload = e => {
      post.src = e.target.result;
      selectedType = null;
      renderModalBody(); renderCalendar(); showToast('Conteúdo adicionado!');
    };
    reader.readAsDataURL(file);
  } else {
    selectedType = null;
    renderModalBody(); renderCalendar(); showToast('Conteúdo adicionado!');
  }
}

function addToStaging(files) {
  const toRead = Array.from(files);
  let done = 0;
  toRead.forEach(file => {
    const fileType = file.type.startsWith('image') ? 'image' : 'video';
    const item = { name: file.name, fileType, emoji: fileType==='image'?'🖼️':'🎬', src: null };
    stagingItems.push(item);
    const reader = new FileReader();
    reader.onload = e => {
      item.src = e.target.result;
      done++;
      if (done === toRead.length) renderModalBody();
    };
    reader.readAsDataURL(file);
  });
}

function removeStagingItem(idx) {
  stagingItems.splice(idx, 1);
  renderModalBody();
}

let dragSrcIdx = null;
function stagingDragStart(e, idx) { dragSrcIdx = idx; }
function stagingDrop(e, idx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === idx) return;
  const moved = stagingItems.splice(dragSrcIdx, 1)[0];
  stagingItems.splice(idx, 0, moved);
  dragSrcIdx = null;
  renderModalBody();
}

function saveCarousel() {
  if (stagingItems.length === 0) return;
  const post = {
    id: uid(),
    name: 'Carrossel',
    type: selectedType,
    emoji: '🎠',
    caption: '',
    status: 'pending',
    comments: [],
    items: stagingItems.slice()
  };
  getDay(selectedDay).posts.push(post);
  stagingItems = [];
  selectedType = null;
  renderModalBody();
  renderCalendar();
  showToast('🎠 Carrossel salvo com ' + post.items.length + ' itens!');
}

function handleDrop(e) {
  e.preventDefault();
  const zone = document.getElementById('uploadZone');
  if (zone) zone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
}

function deletePost(id) {
  const day = getDay(selectedDay);
  day.posts = day.posts.filter(p => p.id !== id);
  renderModalBody();
  renderCalendar();
  showToast('Conteúdo removido.');
}

function sendComment(postId) {
  const post = getDay(selectedDay).posts.find(p => p.id === postId);
  if (!post) return;
  const el = document.getElementById(`comment-${postId}`);
  if (!el || !el.value.trim()) return;
  const now = new Date();
  post.comments.push({
    text: el.value.trim(),
    author: currentUser,
    date: now.toLocaleDateString('pt-BR'),
    time: now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
  });
  el.value = '';
  renderModalBody();
  showToast('💬 Comentário enviado!');
}

function setStatus(id, status) {
  const post = getDay(selectedDay).posts.find(p => p.id === id);
  if (!post) return;
  const commentEl = document.getElementById(`comment-${id}`);
  if (commentEl && commentEl.value.trim()) {
    const now = new Date();
    post.comments.push({
      text: commentEl.value.trim(),
      author: currentUser,
      date: now.toLocaleDateString('pt-BR'),
      time: now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
    });
  }
  // Se clicar no status que já está ativo, desmarca (volta para pending)
  if (post.status === status) {
    post.status = 'pending';
    renderModalBody();
    renderCalendar();
    showToast('⏳ Seleção removida — voltou para Aguardando.');
    return;
  }
  post.status = status;
  renderModalBody();
  renderCalendar();
  const msg = status === 'approved' ? '✅ Conteúdo aprovado!' : '❌ Conteúdo reprovado.';
  showToast(msg);
}

function startRename(postId) {
  const display = document.getElementById(`name-display-${postId}`);
  const wrap = document.getElementById(`name-wrap-${postId}`);
  if (!display || !wrap) return;
  const post = getDay(selectedDay).posts.find(p => p.id === postId);
  if (!post) return;
  wrap.innerHTML = `<input class="post-name-input" id="name-input-${postId}"
    value="${post.name}"
    onblur="commitRename('${postId}')"
    onkeydown="if(event.key==='Enter') this.blur(); if(event.key==='Escape') cancelRename('${postId}','${post.name}')">`;
  document.getElementById(`name-input-${postId}`)?.select();
}

function commitRename(postId) {
  const input = document.getElementById(`name-input-${postId}`);
  if (!input) return;
  const val = input.value.trim();
  const post = getDay(selectedDay).posts.find(p => p.id === postId);
  if (post && val) post.name = val;
  renderModalBody();
  renderCalendar();
}

function cancelRename(postId, original) {
  const post = getDay(selectedDay).posts.find(p => p.id === postId);
  if (post) post.name = original;
  renderModalBody();
}

function deleteComment(postId, idx) {
  const post = getDay(selectedDay).posts.find(p => p.id === postId);
  if (!post) return;
  post.comments.splice(idx, 1);
  renderModalBody();
  showToast('Comentário excluído.');
}

function getOrCreatePreviewOverlay() {
  let overlay = document.getElementById('previewOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'previewOverlay';
    overlay.className = 'preview-overlay';
    overlay.innerHTML = `<div class="preview-box" id="previewBox"></div>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) closePreview(); });
    document.body.appendChild(overlay);
  }
  return overlay;
}

function renderPreviewItem(item, idx, total) {
  const box = document.getElementById('previewBox');
  const src = item.src || null;
  const name = item.name || '';
  const ftype = item.fileType || item.type;
  const navLeft  = total > 1 ? `<button class="preview-nav left"  onclick="previewNav(-1)">←</button>` : '';
  const navRight = total > 1 ? `<button class="preview-nav right" onclick="previewNav(1)">→</button>` : '';
  const counter  = total > 1 ? `<div class="preview-counter">${idx+1} / ${total}</div>` : '';
  let media = '';
  if (src && (ftype==='image'||ftype==='photo')) {
    media = `<img src="${src}" alt="${name}" style="max-width:88vw;max-height:82vh;border-radius:12px;display:block;">`;
  } else if (src && ftype==='video') {
    media = `<video src="${src}" controls autoplay style="max-width:88vw;max-height:82vh;border-radius:12px;display:block;"></video>`;
  } else {
    media = `<div style="width:260px;height:260px;background:var(--stone);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:64px">${item.emoji||'📄'}</div>`;
  }
  box.innerHTML = `${counter}${navLeft}${media}${navRight}
    <button class="preview-close" onclick="closePreview()">✕</button>
    <div class="preview-label">${name}</div>`;
}

let previewItems = [];
let previewIdx = 0;

function openPreview(postId) {
  const post = getDay(selectedDay).posts.find(p => p.id === postId);
  if (!post) return;
  previewItems = [{ src: post.src, name: post.name, fileType: post.type, emoji: post.emoji }];
  previewIdx = 0;
  const overlay = getOrCreatePreviewOverlay();
  renderPreviewItem(previewItems[0], 0, 1);
  requestAnimationFrame(() => overlay.classList.add('open'));
}

function openCarouselPreview(postId, startIdx) {
  const post = getDay(selectedDay).posts.find(p => p.id === postId);
  if (!post || !post.items) return;
  previewItems = post.items;
  previewIdx = startIdx;
  const overlay = getOrCreatePreviewOverlay();
  renderPreviewItem(previewItems[previewIdx], previewIdx, previewItems.length);
  requestAnimationFrame(() => overlay.classList.add('open'));
}

function previewNav(dir) {
  const vid = document.querySelector('#previewBox video');
  if (vid) vid.pause();
  previewIdx = (previewIdx + dir + previewItems.length) % previewItems.length;
  renderPreviewItem(previewItems[previewIdx], previewIdx, previewItems.length);
}

function closePreview() {
  const overlay = document.getElementById('previewOverlay');
  if (overlay) {
    overlay.classList.remove('open');
    const vid = overlay.querySelector('video');
    if (vid) vid.pause();
  }
}

async function doLogin() {
  const email = document.getElementById('loginEmail')?.value.trim().toLowerCase();
  const password = document.getElementById('loginPassword')?.value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginSubmitBtn');

  if (btn) { btn.textContent = 'Entrando...'; btn.disabled = true; }

  try {
    // Login via Supabase Auth
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    // Buscar perfil do usuário
    const { data: perfil, error: perfilError } = await sb.from('usuarios')
      .select('*').eq('id', data.user.id).single();
    if (perfilError) throw perfilError;

    currentUser = perfil.nome;
    currentUserRole = perfil.papel;
    currentClienteId = perfil.cliente_id;
    isAgency = perfil.papel === 'agencia';

    if (errorEl) errorEl.style.display = 'none';
    const screen = document.getElementById('loginScreen');
    if (screen) screen.remove();

    const badge = document.getElementById('roleBadge');
    const switchBtn = document.getElementById('switchBtn');
    if (badge) { badge.textContent = isAgency ? 'Agência' : 'Cliente'; badge.className = 'role-badge' + (isAgency?'':' client'); }
    if (switchBtn) switchBtn.style.display = isAgency ? '' : 'none';

    await loadCalendarData();
    renderCalendar();

  } catch(err) {
    console.error(err);
    if (errorEl) { errorEl.textContent = 'E-mail ou senha incorretos.'; errorEl.style.display = 'block'; }
    if (btn) { btn.textContent = 'Entrar →'; btn.disabled = false; }
  }
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentUserRole = null; isAgency = true; calendarData = {};
  showLoginScreen();
}

// SUPABASE DATA
// ────────────────────────────────────────────
async function loadCalendarData() {
  calendarData = {};
  try {
    // Buscar cards do mês atual
    const startDate = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-01`;
    const endDate = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-31`;

    let query = sb.from('cards').select(`
      *,
      posts(*),
      comentarios(*)
    `).gte('data', startDate).lte('data', endDate);

    // Filtrar por cliente se não for agência
    if (!isAgency && currentClienteId) {
      query = query.eq('cliente_id', currentClienteId);
    }

    const { data: cards, error } = await query.order('data');
    if (error) throw error;

    // Organizar por data
    (cards || []).forEach(card => {
      // Garantir formato YYYY-MM-DD
      const dateStr = card.data.substring(0, 10);
      if (!calendarData[dateStr]) calendarData[dateStr] = { cards: [] };

      // Montar post se existir
      let post = null;
      if (card.posts && card.posts.length > 0) {
        const p = card.posts[0];
        post = { type: p.tipo, name: p.nome, src: null, emoji: p.tipo==='photo'?'🖼️':p.tipo==='video'?'🎬':'🎠', storage_path: p.storage_path, db_id: p.id };
      }

      calendarData[dateStr].cards.push({
        id: card.id,
        title: card.titulo,
        caption: card.legenda || '',
        status: card.status,
        saved: card.salvo,
        post: post,
        comments: (card.comentarios || []).map(c => ({
          text: c.texto, author: c.autor_nome,
          date: new Date(c.criado_em).toLocaleDateString('pt-BR'),
          time: new Date(c.criado_em).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}),
          db_id: c.id
        })),
        history: [],
        db_id: card.id
      });
    });
  } catch(err) {
    console.error('Erro ao carregar dados:', err);
    showToast('Erro ao carregar calendário');
  }
}

async function saveCardToSupabase(card, dateStr) {
  try {
    const clienteId = isAgency ? (currentClienteId || null) : currentClienteId;
    
    if (card.db_id && card.db_id === card.id) {
      // Update
      await sb.from('cards').update({
        titulo: card.title,
        legenda: card.caption,
        status: card.status,
        salvo: card.saved,
        atualizado_em: new Date().toISOString()
      }).eq('id', card.db_id);
    } else {
      // Insert
      const { data, error } = await sb.from('cards').insert({
        titulo: card.title,
        legenda: card.caption,
        status: card.status,
        salvo: card.saved,
        data: dateStr,
        cliente_id: clienteId,
        criado_por: (await sb.auth.getUser()).data.user?.id
      }).select().single();
      if (error) throw error;
      card.db_id = data.id;
      card.id = data.id;
    }
  } catch(err) {
    console.error('Erro ao salvar card:', err);
    showToast('Erro ao salvar. Tente novamente.');
  }
}

async function saveCommentToSupabase(cardId, text) {
  try {
    const user = (await sb.auth.getUser()).data.user;
    const { data, error } = await sb.from('comentarios').insert({
      card_id: cardId,
      autor_id: user?.id,
      autor_nome: currentUser,
      texto: text
    }).select().single();
    if (error) throw error;
    return data;
  } catch(err) {
    console.error('Erro ao salvar comentário:', err);
  }
}

async function uploadFileToSupabase(file, cardId) {
  try {
    const ext = file.name.split('.').pop();
    const path = `${cardId}/${uid()}.${ext}`;
    const { error } = await sb.storage.from('posts-media').upload(path, file);
    if (error) throw error;
    return path;
  } catch(err) {
    console.error('Erro ao fazer upload:', err);
    return null;
  }
}

async function getFileUrl(storagePath) {
  if (!storagePath) return null;
  const { data } = await sb.storage.from('posts-media').createSignedUrl(storagePath, 3600);
  return data?.signedUrl || null;
}

async function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  await loadCalendarData();
  renderCalendar();
}
async function goToday() {
  const t = new Date();
  viewMonth = t.getMonth(); viewYear = t.getFullYear();
  await loadCalendarData();
  renderCalendar();
}

  t.classList.add('show');

  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
// ────────────────────────────────────────────
async function initApp() {
  // Verificar se já tem sessão ativa no Supabase
  const { data: { session } } = await sb.auth.getSession();

  if (session) {
    try {
      const { data: perfil } = await sb.from('usuarios')
        .select('*').eq('id', session.user.id).single();

      if (perfil) {
        currentUser = perfil.nome;
        currentUserRole = perfil.papel;
        currentClienteId = perfil.cliente_id;
        isAgency = perfil.papel === 'agencia';

        const badge = document.getElementById('roleBadge');
        const btn = document.getElementById('switchBtn');
        if (badge) { badge.textContent = isAgency ? 'Agência' : 'Cliente'; badge.className = 'role-badge' + (isAgency?'':' client'); }
        if (btn) btn.style.display = isAgency ? '' : 'none';

        await loadCalendarData();
        renderCalendar();
        return;
      }
    } catch(e) { console.error(e); }
  }

  showLoginScreen();
}
