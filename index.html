<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma · Font Life</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Barlow+Condensed:wght@300;400;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --off-white: #F2F0EB;
    --surface: #ffffff;
    --stone: #e8e5df;
    --stone-dark: #d0ccc4;
    --ink: #1E1E1E;
    --ink-light: #555550;
    --ink-lighter: #999890;
    --accent: #3A6EA5;
    --accent-light: #edf3f9;
    --accent-mid: #5a8ec5;
    --accent-glow: rgba(58,110,165,0.2);
    --warn: #D9261C;
    --warn-light: #fdf0ef;
    --pending: #c07800;
    --pending-light: #fff8e6;
    --green: #5C9B3A;
    --green-light: #eef6e8;
    --ne-red: #D9261C;
    --ne-yellow: #F0A500;
    --ne-green: #5C9B3A;
    --ne-blue: #3A6EA5;
    --grad-start: #1E1E1E;
    --grad-end: #2A2A2A;
    --radius: 4px;
    --radius-sm: 2px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-md: 0 6px 28px rgba(0,0,0,0.10);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.14);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--off-white);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: #1E1E1E;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    padding: 0 36px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  /* Barra colorida no topo do header */
  header::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #D9261C 50%, #F0A500 65%, #5C9B3A 80%, #3A6EA5 100%);
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-img-wrap {
    width: 56px; height: 56px;
    border-radius: 4px;
    overflow: visible;
    background: transparent;
    border: none;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 2px;
    mix-blend-mode: screen;
  }
  .logo-brand {
    font-family: 'Barlow', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    line-height: 1;
  }
  .logo-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    color: #FAFAF8;
    letter-spacing: 0.02em;
    line-height: 1.15;
    font-weight: 700;
    text-transform: uppercase;
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .role-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 2px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    border: 0.5px solid rgba(255,255,255,0.15);
  }
  .role-badge.client { background: rgba(58,110,165,0.2); color: #7aadd4; border-color: rgba(58,110,165,0.3); }
  .switch-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 2px; padding: 6px 16px;
    cursor: pointer; transition: all .18s;
  }
  .switch-btn:hover { background: #D9261C; color: white; border-color: #D9261C; }

  /* ── LAYOUT ── */
  .app { max-width: 1280px; margin: 0 auto; padding: 32px 36px; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 24px;
  }
  .month-nav { display: flex; align-items: center; gap: 14px; }
  .month-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px; font-weight: 900;
    letter-spacing: 0.02em; text-transform: uppercase;
    color: var(--ink); min-width: 260px;
  }
  .nav-btn {
    width: 32px; height: 32px; border-radius: 2px;
    border: 0.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: var(--ink-light);
    transition: all .15s;
  }
  .nav-btn:hover { background: #D9261C; color: white; border-color: #D9261C; }
  .today-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: #FAFAF8;
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 2px; padding: 6px 16px;
    cursor: pointer; transition: all .15s;
  }
  .today-btn:hover { background: #D9261C; border-color: #D9261C; }
  .legend { display: flex; gap: 14px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-lighter); font-weight: 500; letter-spacing: 0.04em; }
  .legend-dot { width: 6px; height: 6px; border-radius: 1px; }

  /* ── CALENDAR ── */
  .calendar-wrap {
    background: var(--surface);
    border-radius: 0;
    border: 1px solid var(--stone);
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
    background: #1E1E1E;
  }
  .weekday {
    padding: 12px 0;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .weekday.weekend { color: rgba(255,255,255,0.18); }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .day-cell {
    border-right: 1px solid var(--stone);
    border-bottom: 1px solid var(--stone);
    min-height: 120px; padding: 10px;
    cursor: pointer; transition: background .12s;
    position: relative; display: flex;
    flex-direction: column; gap: 4px;
    background: var(--surface);
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #f5f3ef; }
  .day-cell.other-month { opacity: 0.25; cursor: default; }
  .day-cell.other-month:hover { background: transparent; }
  .day-cell.today .day-num {
    background: #D9261C; color: white; border-radius: 2px;
    box-shadow: 0 2px 8px rgba(217,38,28,0.4);
  }
  .day-cell.weekend { background: #f9f8f5; }
  .day-cell.past { background: #f9f8f5; opacity: 0.5; }
  .day-cell.past:hover { opacity: 0.6; }
  .day-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px; flex-shrink: 0; align-self: flex-start;
    color: var(--ink-light);
  }
  .day-event-badge {
    font-family: 'Barlow', sans-serif;
    font-size: 10px; font-weight: 500;
    background: rgba(240,165,0,0.12);
    color: #F0A500; border-radius: 2px;
    padding: 2px 7px;
    display: flex; align-items: center; gap: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%; border-left: 2px solid #F0A500;
  }
  .day-event-badge::before { content: '◆'; font-size: 6px; }
  .day-posts { display: flex; flex-direction: column; gap: 3px; margin-top: 2px; }
  .post-chip {
    font-family: 'Barlow', sans-serif;
    font-size: 10px; font-weight: 500; border-radius: 2px;
    padding: 3px 7px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
    border-left: 2px solid currentColor;
  }
  .post-chip.approved { background: var(--green-light); color: var(--green); }
  .post-chip.pending  { background: var(--pending-light); color: var(--pending); }
  .post-chip.rejected { background: var(--warn-light); color: var(--warn); }
  .post-chip.empty    { background: var(--off-white); color: var(--ink-lighter); }
  .post-chip::before  { content: ''; width: 4px; height: 4px; border-radius: 50%; background: currentColor; flex-shrink:0; }
  .add-hint {
    font-family: 'Barlow', sans-serif;
    font-size: 10px; font-weight: 500; color: var(--ne-red);
    margin-top: auto; opacity: 0; transition: opacity .15s;
  }
  .day-cell:hover .add-hint { opacity: 1; }

  /* ── STATS BAR ── */
  .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--stone);
    border-radius: 0; border-top: 2px solid transparent;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow-card); flex: 1;
    transition: border-color .18s, transform .18s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card.s-green  { border-top-color: #5C9B3A; }
  .stat-card.s-yellow { border-top-color: #F0A500; }
  .stat-card.s-red    { border-top-color: #D9261C; }
  .stat-card.s-blue   { border-top-color: #3A6EA5; }
  .stat-icon {
    width: 38px; height: 38px; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
    background: rgba(255,255,255,0.05);
  }
  .stat-icon.green  { background: rgba(92,155,58,0.15); }
  .stat-icon.blue   { background: rgba(58,110,165,0.15); }
  .stat-icon.yellow { background: rgba(240,165,0,0.15); }
  .stat-icon.red    { background: rgba(217,38,28,0.15); }
  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; color: var(--ink-lighter);
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  }
  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900; line-height: 1; margin-top: 2px; color: var(--ink);
  }

  /* ── MODAL OVERLAY ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .22s;
    backdrop-filter: blur(4px);
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #2A2A2A;
    border: 1px solid var(--stone);
    border-radius: 0;
    width: 680px;
    max-width: calc(100vw - 48px);
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    transform: translateY(16px);
    transition: transform .22s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 0 28px;
    height: 60px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    position: sticky; top: 0;
    background: #1E1E1E;
    z-index: 2;
    border-top: 3px solid #D9261C;
  }
  .modal-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 900;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: #FAFAF8;
  }
  .modal-date small {
    display: block; font-family: 'Barlow', sans-serif;
    font-size: 11px; font-weight: 400;
    color: rgba(255,255,255,0.35);
    margin-top: 1px; font-style: normal;
  }
  .modal-close {
    width: 30px; height: 30px; border-radius: 2px;
    border: 0.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
  }
  .modal-close:hover { background: #D9261C; color: white; border-color: #D9261C; }

  .modal-body { padding: 20px 28px 28px; }

  /* Event badge in modal */
  .modal-event {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--pending-light);
    color: var(--pending);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px; font-weight: 500;
    margin-bottom: 24px;
  }

  /* Upload zone */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-lighter); margin-bottom: 10px;
  }
  .upload-zone {
    border: 2px dashed var(--stone-dark);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all .18s;
    margin-bottom: 24px;
    background: var(--off-white);
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-light); }
  .upload-zone.drag { transform: scale(1.01); }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-text { font-size: 13px; color: var(--ink-light); }
  .upload-text strong { color: var(--accent); }
  .upload-sub { font-size: 11px; color: var(--ink-lighter); margin-top: 4px; }
  #fileInput { display: none; }

  /* Content items */
  .content-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
  .content-item {
    border: 1px solid var(--stone);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 14px;
    transition: box-shadow .15s;
  }
  .content-item:hover { box-shadow: var(--shadow); }
  .content-thumb {
    width: 56px; height: 56px; border-radius: 8px;
    background: var(--stone);
    flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .content-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .content-info { flex: 1; min-width: 0; }
  .content-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .content-meta { font-size: 11px; color: var(--ink-lighter); margin-top: 2px; }
  .content-caption {
    font-size: 12px; color: var(--ink-light);
    margin-top: 6px; line-height: 1.4;
    background: var(--off-white);
    border-radius: 5px; padding: 6px 8px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .content-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

  /* Status badges */
  .status-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700;
    padding: 3px 10px; border-radius: 2px;
    display: inline-flex; align-items: center; gap: 4px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .status-badge.approved { background: var(--green-light); color: var(--green); border: 1px solid #c5deb8; }
  .status-badge.pending  { background: var(--pending-light); color: var(--pending); border: 1px solid #f0d88a; }
  .status-badge.rejected { background: var(--warn-light); color: var(--warn); border: 1px solid #f0b8b5; }

  /* Buttons */
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    border: none; border-radius: 8px;
    padding: 8px 14px; cursor: pointer;
    transition: all .15s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-approve { background: var(--accent-light); color: var(--accent); border: 1.5px solid transparent; }
  .btn-approve:hover { background: var(--accent); color: white; }
  .btn-approve.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,90,61,0.18); }
  .btn-reject  { background: var(--warn-light); color: var(--warn); border: 1.5px solid transparent; }
  .btn-reject:hover  { background: var(--warn); color: white; }
  .btn-reject.active { background: var(--warn); color: white; border-color: var(--warn); box-shadow: 0 0 0 3px rgba(192,57,43,0.18); }
  .btn-pending { background: var(--blue-light); color: var(--blue); }
  .btn-ghost   { background: var(--stone); color: var(--ink-light); border: 1.5px solid transparent; }
  .btn-ghost:hover { background: var(--stone-dark); }
  .btn-primary { background: var(--ink); color: white; font-size: 13px; padding: 10px 20px; }
  .btn-primary:hover { background: #333; }
  .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }

  /* Comment */
  .comment-area {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    border: 1px solid var(--stone-dark);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    resize: vertical;
    min-height: 72px;
    margin-top: 10px;
    outline: none;
    transition: border-color .15s;
  }
  .comment-area:focus { border-color: var(--accent); }

  /* Caption input */
  .caption-input {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--ink);
    border: 1px solid var(--stone-dark);
    border-radius: 6px;
    padding: 7px 10px;
    margin-top: 6px;
    outline: none;
    transition: border-color .15s;
  }
  .caption-input:focus { border-color: var(--accent); }

  .modal-footer {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding-top: 14px;
    border-top: 0.5px solid rgba(255,255,255,0.08);
    margin-top: 8px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--ink-lighter);
  }
  .empty-state .es-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
    background: #1E1E1E;
    color: #FAFAF8;
    font-family: 'Barlow', sans-serif;
    font-size: 13px; font-weight: 500;
    border-radius: 2px; padding: 11px 22px;
    opacity: 0; pointer-events: none;
    transition: all .25s; z-index: 999;
    white-space: nowrap;
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    border-left: 3px solid #D9261C;
    border-top: 0.5px solid rgba(255,255,255,0.1);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── ADD EVENT SECTION ── */
  .event-section { margin-bottom: 24px; }
  .event-input-row { display: flex; gap: 8px; }
  .event-input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid var(--stone-dark);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    outline: none;
    transition: border-color .15s;
    color: var(--ink);
  }
  .event-input:focus { border-color: var(--accent); }
  .current-events { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .event-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--pending-light);
    color: var(--pending);
    border-radius: 20px; padding: 4px 10px 4px 12px;
    font-size: 12px; font-weight: 500;
  }
  .event-tag-remove {
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(139,105,20,0.15);
    border: none; cursor: pointer; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--pending); transition: all .15s;
  }
  .event-tag-remove:hover { background: var(--pending); color: white; }

  /* Client view notice */
  .client-notice {
    background: var(--accent-light);
    border: 1px solid #c5d8ed;
    border-left: 3px solid #3A6EA5;
    border-radius: 0;
    padding: 12px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 12px; font-weight: 400;
    color: var(--accent);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
  }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--stone); margin: 16px 0; }

  /* Tipo de conteúdo selector */
  .type-selector {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .type-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--stone-dark);
    border-radius: 20px; padding: 6px 14px;
    background: var(--white); color: var(--ink-light);
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 5px;
  }
  .type-btn:hover { border-color: var(--accent); color: var(--accent); }
  .type-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

  /* Staging area para carrossel */
  .staging-area {
    background: var(--off-white);
    border: 1.5px dashed var(--stone-dark);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .staging-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink-lighter);
    margin-bottom: 10px;
  }
  .staging-thumbs {
    display: flex; gap: 8px; flex-wrap: wrap; min-height: 70px;
    align-items: flex-start;
  }
  .staging-thumb {
    width: 70px; height: 70px; border-radius: 8px;
    background: var(--stone); position: relative;
    overflow: hidden; cursor: grab; flex-shrink: 0;
    border: 2px solid transparent;
    transition: border-color .15s, transform .15s;
  }
  .staging-thumb:active { cursor: grabbing; transform: scale(1.05); }
  .staging-thumb.drag-over { border-color: var(--accent); }
  .staging-thumb img, .staging-thumb video {
    width: 100%; height: 100%; object-fit: cover;
  }
  .staging-thumb .st-remove {
    position: absolute; top: 3px; right: 3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: white;
    border: none; cursor: pointer; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .staging-thumb .st-order {
    position: absolute; bottom: 3px; left: 3px;
    background: rgba(0,0,0,0.55); color: white;
    border-radius: 4px; font-size: 9px; font-weight: 700;
    padding: 1px 5px;
  }
  .staging-thumb .st-emoji {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .staging-actions {
    display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
  }

  /* Card de carrossel no modal */
  .carousel-card {
    border: 1px solid var(--stone);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 4px;
  }
  .carousel-strip {
    display: flex; gap: 4px; padding: 10px 10px 8px;
    overflow-x: auto; background: var(--off-white);
    scrollbar-width: thin;
  }
  .carousel-strip-thumb {
    width: 60px; height: 60px; border-radius: 6px;
    flex-shrink: 0; background: var(--stone);
    overflow: hidden; cursor: zoom-in;
    border: 2px solid transparent; transition: border-color .15s;
  }
  .carousel-strip-thumb:hover { border-color: var(--accent); }
  .carousel-strip-thumb img, .carousel-strip-thumb video {
    width: 100%; height: 100%; object-fit: cover;
  }
  .carousel-strip-thumb .cs-emoji {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .carousel-info { padding: 10px 14px; }

  /* Preview com navegação */
  .preview-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,0.38);
    border: none; cursor: pointer; font-size: 18px; color: white;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s; backdrop-filter: blur(4px);
    z-index: 10;
  }
  .preview-nav:hover { background: rgba(0,0,0,0.62); }
  .preview-nav.left  { left: 10px; }
  .preview-nav.right { right: 10px; }
  .preview-counter {
    position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px; color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.4); border-radius: 20px;
    padding: 3px 10px; backdrop-filter: blur(4px);
  }

  /* Login screen */
  /* ── LOGIN NEW ENTRY ── */
  .login-screen {
    position: fixed; inset: 0;
    background: #1E1E1E;
    z-index: 500;
    display: flex; align-items: stretch;
    overflow: hidden;
    font-family: 'Barlow', sans-serif;
  }
  .login-hero {
    flex: 1; background: #2A2A2A;
    display: flex; flex-direction: column;
    justify-content: center; padding: 64px 72px;
    position: relative; overflow: hidden;
  }
  .login-hero::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #D9261C 50%, #F0A500 65%, #5C9B3A 80%, #3A6EA5 100%);
  }
  .login-ne-logo { width: 200px; margin-bottom: 56px; }
  .login-ne-logo img { width: 100%; height: auto; display: block; }
  .login-hero-tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: #D9261C; margin-bottom: 14px;
  }
  .login-hero-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px; font-weight: 900; line-height: 1.0;
    color: #FAFAF8; letter-spacing: -0.5px;
    margin-bottom: 20px; text-transform: uppercase;
  }
  .login-hero-title em { font-style: normal; color: #F0A500; }
  .login-hero-desc {
    font-size: 15px; font-weight: 300;
    color: var(--ink-light); line-height: 1.7;
    max-width: 360px; margin-bottom: 48px;
  }
  .login-hero-features { display: flex; flex-direction: column; gap: 10px; }
  .login-feature {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 400; color: rgba(250,250,248,0.45);
  }
  .login-feature-bar { width: 16px; height: 2px; border-radius: 1px; flex-shrink: 0; }
  .login-box {
    width: 400px; flex-shrink: 0; background: #FAFAF8;
    display: flex; flex-direction: column;
    justify-content: center; padding: 64px 52px; position: relative;
  }
  .login-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #D9261C 50%, #F0A500 65%, #5C9B3A 80%, #3A6EA5 100%);
  }
  .login-box-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: #D9261C; margin-bottom: 10px;
  }
  .login-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 32px; line-height: 1.0;
    text-transform: uppercase; letter-spacing: -0.3px;
    color: #1E1E1E; margin-bottom: 8px;
  }
  .login-sub { font-size: 13px; font-weight: 300; color: #888; margin-bottom: 36px; line-height: 1.5; }
  .login-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: #1E1E1E; display: block; margin-bottom: 6px;
  }
  .login-input {
    width: 100%; font-family: 'Barlow', sans-serif;
    font-size: 14px; color: #1E1E1E;
    border: 1.5px solid #ddd; border-radius: 2px;
    padding: 12px 14px; outline: none;
    transition: border-color .15s; margin-bottom: 16px; background: white;
  }
  .login-input:focus { border-color: #D9261C; }
  .login-input::placeholder { color: #bbb; }
  .login-forgot {
    font-size: 12px; color: #3A6EA5; text-align: right;
    display: block; margin-top: -10px; margin-bottom: 24px;
    cursor: pointer; font-weight: 500;
  }
  .login-forgot:hover { text-decoration: underline; }
  .login-btn {
    width: 100%; font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; background: #D9261C; color: white;
    border: none; border-radius: 2px; padding: 14px; cursor: pointer;
    transition: opacity .15s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-footer-note { font-size: 11px; color: #aaa; text-align: center; margin-top: 24px; line-height: 1.6; }
  .login-error {
    font-size: 12px; color: #D9261C; background: #fdf0ef;
    border-left: 3px solid #D9261C; border-radius: 2px;
    padding: 8px 12px; margin-bottom: 16px; display: none; text-align: left;
  }
  .login-wrap { display: contents; }
  @media (max-width: 700px) {
    .login-screen { flex-direction: column; }
    .login-hero { display: none; }
    .login-box { width: 100%; padding: 40px 28px; }
  }

  /* Comentário com autor */
  .comment-author {
    font-size: 10px; font-weight: 600;
    color: var(--ink-lighter); letter-spacing: 0.04em;
    text-transform: uppercase; margin-bottom: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .comment-author span { color: var(--ink-light); font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 10px; }
  /* Área de novo comentário */
  .comment-send-row {
    display: flex; gap: 8px; align-items: flex-end; margin-top: 10px;
  }
  .comment-send-row .comment-area { margin-top: 0; flex: 1; min-height: 60px; }
  .btn-send-comment {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 700;
    background: linear-gradient(110deg, var(--grad-start), var(--accent-mid));
    color: white;
    border: none; border-radius: 8px;
    padding: 10px 14px; cursor: pointer;
    transition: opacity .15s; white-space: nowrap;
    align-self: flex-end;
    height: 60px;
  }
  .btn-send-comment:hover { opacity: 0.88; }

  /* Preview lightbox */
  .preview-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,10,0.88);
    z-index: 400;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
    backdrop-filter: blur(6px);
  }
  .preview-overlay.open { opacity: 1; pointer-events: all; }
  .preview-box {
    max-width: 90vw; max-height: 86vh;
    border-radius: 12px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-box img, .preview-box video {
    max-width: 88vw; max-height: 82vh;
    display: block; border-radius: 12px;
    object-fit: contain;
  }
  .preview-close {
    position: absolute; top: 10px; right: 10px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none; cursor: pointer;
    font-size: 16px; color: white;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s; backdrop-filter: blur(4px);
  }
  .preview-close:hover { background: rgba(255,255,255,0.3); }
  .preview-label {
    position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px; color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.4); border-radius: 20px;
    padding: 4px 12px; white-space: nowrap;
    backdrop-filter: blur(4px);
  }
  /* Thumb clicável */
  .content-thumb { cursor: default; }
  .content-thumb.has-preview { cursor: zoom-in; transition: opacity .15s; }
  .content-thumb.has-preview:hover { opacity: 0.8; }
  /* Comentário com botão excluir */
  .comment-row {
    display: flex; align-items: flex-start; gap: 6px;
    margin-top: 4px;
  }
  .comment-bubble {
    flex: 1;
    font-size: 11px; color: var(--ink-light);
    background: var(--off-white);
    border-radius: 5px; padding: 5px 8px;
    line-height: 1.4;
  }
  .comment-del {
    width: 20px; height: 20px; border-radius: 50%;
    background: none; border: 1px solid var(--stone-dark);
    cursor: pointer; font-size: 10px; color: var(--ink-lighter);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
    transition: all .15s;
  }
  .comment-del:hover { background: var(--warn); color: white; border-color: var(--warn); }

  /* ── CAMPAIGN CARDS ── */
  .campaign-card {
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: box-shadow .18s, transform .18s;
  }
  .campaign-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .campaign-card.status-pending  { background: #fff8e6; border-color: #F0A500; border-left-width: 4px; }
  .campaign-card.status-approved { background: #eef6e8; border-color: #5C9B3A; border-left-width: 4px; }
  .campaign-card.status-rejected { background: #fdf0ef; border-color: #D9261C; border-left-width: 4px; }
  .campaign-card.status-empty    { background: var(--off-white); border-color: var(--stone); }

  .campaign-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    gap: 10px;
  }
  .campaign-title-row { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .campaign-title {
    font-size: 14px; font-weight: 700;
    color: var(--ink); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; border-radius: 4px;
    padding: 2px 5px; margin: -2px -5px;
    transition: background .12s;
  }
  .campaign-title:hover { background: rgba(0,0,0,0.06); }
  .campaign-title-input {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; font-weight: 700; color: var(--ink);
    border: 1.5px solid var(--accent); border-radius: 5px;
    padding: 3px 8px; outline: none; flex: 1;
  }
  .campaign-header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .campaign-body { padding: 14px 16px; }

  /* Legenda */
  .caption-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-lighter); margin-bottom: 5px; }
  .caption-textarea {
    width: 100%; font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; color: var(--ink);
    border: 1.5px solid var(--stone-dark); border-radius: 8px;
    padding: 9px 12px; outline: none; resize: vertical;
    min-height: 64px; transition: border-color .15s;
    background: rgba(255,255,255,0.7);
    line-height: 1.5; margin-bottom: 14px;
  }
  .caption-textarea:focus { border-color: var(--accent); }
  .caption-display {
    font-size: 12px; color: var(--ink-light); line-height: 1.55;
    background: rgba(255,255,255,0.5); border-radius: 8px;
    padding: 9px 12px; margin-bottom: 14px;
    border: 1px solid rgba(0,0,0,0.06); cursor: pointer;
    transition: background .12s;
  }
  .caption-display:hover { background: rgba(255,255,255,0.8); }
  .caption-display.empty { color: var(--ink-lighter); font-style: italic; }

  /* Post dentro do card */
  .card-post-area {
    border: 1.5px dashed var(--stone-dark);
    border-radius: var(--radius-sm);
    overflow: hidden; background: rgba(255,255,255,0.5);
  }
  .card-post-area.has-post { border-style: solid; border-color: rgba(0,0,0,0.08); }
  .card-post-inner {
    display: flex; align-items: flex-start; gap: 12px; padding: 12px;
  }
  .card-post-thumb {
    width: 60px; height: 60px; border-radius: 8px;
    background: var(--stone); flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; cursor: default;
  }
  .card-post-thumb.has-preview { cursor: zoom-in; }
  .card-post-thumb.has-preview:hover { opacity: 0.85; }
  .card-post-info { flex: 1; min-width: 0; }
  .card-post-name { font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .card-post-meta { font-size: 11px; color: var(--ink-lighter); }
  .card-post-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

  /* Upload zone dentro do card */
  .card-upload-zone {
    padding: 20px; text-align: center; cursor: pointer;
    transition: background .15s;
  }
  .card-upload-zone:hover { background: rgba(36,81,160,0.04); }
  .card-upload-inner { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .card-type-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }

  /* Comentários dentro do card */
  .card-comments { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }

  /* Chip do calendário colorido por status */
  .post-chip.approved { background: #e4f7ed; color: #1a6e48; border-left: 3px solid #1a6e48; }
  .post-chip.pending  { background: #fffbe6; color: #7a5800; border-left: 3px solid #d4a800; }
  .post-chip.rejected { background: #fff0f0; color: #c0392b; border-left: 3px solid #c0392b; }
  .post-chip.empty    { background: var(--off-white); color: var(--ink-lighter); border-left: 3px solid var(--stone-dark); }

  /* Botão + no canto do dia */
  .day-add-btn {
    position: absolute; bottom: 6px; right: 6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); color: white;
    border: none; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0;
    transition: opacity .15s, transform .15s;
    box-shadow: 0 2px 6px var(--accent-glow);
    z-index: 2;
  }
  .day-cell:hover .day-add-btn { opacity: 1; }
  .day-add-btn:hover { transform: scale(1.15); }

  /* Nome editável */
  .post-name-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .post-name-display {
    font-weight: 500; font-size: 13px;
    cursor: pointer; border-radius: 4px;
    padding: 2px 6px; margin: -2px -6px;
    transition: background .15s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
  }
  .post-name-display:hover { background: var(--stone); }
  .post-name-display::after { content: ' ✏️'; font-size: 10px; opacity: 0; transition: opacity .15s; }
  .post-name-display:hover::after { opacity: 1; }
  .post-name-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; color: var(--ink);
    border: 1.5px solid var(--accent);
    border-radius: 5px; padding: 3px 8px;
    outline: none; flex: 1; min-width: 0;
  }

  /* Card saved state */
  .campaign-card.saved { box-shadow: 0 0 0 2px var(--green), var(--shadow-card); }
  .campaign-card.saved .campaign-header { border-bottom-color: rgba(26,110,72,0.15); }
  .card-footer {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 8px; padding: 10px 16px 14px;
    border-top: 1px solid rgba(0,0,0,0.06);
    margin-top: 10px;
  }
  .btn-save-card {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 700;
    background: linear-gradient(110deg, var(--grad-start), var(--accent-mid));
    color: white; border: none; border-radius: 8px;
    padding: 8px 18px; cursor: pointer; transition: opacity .15s;
  }
  .btn-save-card:hover { opacity: 0.88; }
  .btn-save-card.saved-state {
    background: var(--green-light); color: var(--green);
    border: 1.5px solid var(--green); cursor: default;
  }
  .btn-alter-card {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    background: var(--accent-light); color: var(--accent);
    border: 1.5px solid transparent; border-radius: 8px;
    padding: 8px 14px; cursor: pointer; transition: all .15s;
  }
  .btn-alter-card:hover { background: var(--accent); color: white; }
  .btn-delete-card {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    background: var(--warn-light); color: var(--warn);
    border: 1.5px solid transparent; border-radius: 8px;
    padding: 8px 14px; cursor: pointer; transition: all .15s;
  }
  .btn-delete-card:hover { background: var(--warn); color: white; }

  /* Histórico */
  .history-overlay {
    position: fixed; inset: 0;
    background: rgba(10,15,30,0.45);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
    backdrop-filter: blur(4px);
  }
  .history-overlay.open { opacity: 1; pointer-events: all; }
  .history-modal {
    background: var(--surface);
    border-radius: 18px;
    width: 480px; max-width: calc(100vw - 40px);
    max-height: 70vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    transform: translateY(12px);
    transition: transform .2s;
  }
  .history-overlay.open .history-modal { transform: translateY(0); }
  .history-modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--stone);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--surface);
    border-radius: 18px 18px 0 0;
  }
  .history-modal-title { font-size: 16px; font-weight: 700; }
  .history-list { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 10px; }
  .history-item {
    display: flex; gap: 12px; align-items: flex-start;
  }
  .history-icon {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 14px; margin-top: 1px;
  }
  .history-icon.create  { background: var(--accent-light); }
  .history-icon.edit    { background: var(--pending-light); }
  .history-icon.approve { background: var(--green-light); }
  .history-icon.reject  { background: var(--warn-light); }
  .history-icon.delete  { background: #f5e6e6; }
  .history-icon.comment { background: #f0eafa; }
  .history-icon.file    { background: var(--stone); }
  .history-content { flex: 1; }
  .history-action { font-size: 13px; font-weight: 500; color: var(--ink); }
  .history-meta { font-size: 11px; color: var(--ink-lighter); margin-top: 1px; }
  .history-empty { text-align: center; color: var(--ink-lighter); font-size: 13px; padding: 24px 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--stone-dark); border-radius: 0; }

  @media (max-width: 700px) {
    .stats-bar { flex-wrap: wrap; }
    .stat-card { min-width: calc(50% - 8px); }
    .toolbar { flex-direction: column; align-items: flex-start; gap: 12px; }
    .modal { width: calc(100vw - 24px); }
    .modal-header, .modal-body { padding-left: 20px; padding-right: 20px; }
    .day-cell { min-height: 80px; }
    .legend { display: none; }
  }
</style>

// Capturar token de magic link / reset de senha na URL
(async function handleAuthRedirect() {
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    // Extrair tokens da URL
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');

    if (accessToken) {
      // Definir sessão com o token
      const { data, error } = await sb.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken || ''
      });

      // Limpar hash da URL
      window.history.replaceState({}, document.title, window.location.pathname);

      if (type === 'recovery') {
        // Mostrar formulário de nova senha
        showResetPasswordForm();
        return;
      }
    }
  }
})();

function showResetPasswordForm() {
  const screen = document.createElement('div');
  screen.className = 'login-screen';
  screen.id = 'resetScreen';
  screen.innerHTML = `
    <div class="login-hero">
      <div class="login-hero-tagline">Plataforma de Conteúdo</div>
      <div class="login-hero-title">Criar nova<br><em>senha.</em></div>
    </div>
    <div class="login-box">
      <div class="login-box-eyebrow">Segurança</div>
      <div class="login-title">Nova senha</div>
      <div class="login-sub">Digite sua nova senha de acesso.</div>
      <div class="login-error" id="resetError" style="display:none"></div>
      <label class="login-label">Nova senha</label>
      <input class="login-input" id="newPasswordInput" type="password" placeholder="••••••••" minlength="6">
      <label class="login-label">Confirmar senha</label>
      <input class="login-input" id="confirmPasswordInput" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') doResetPassword()">
      <button class="login-btn" onclick="doResetPassword()">Salvar nova senha →</button>
    </div>`;
  document.body.appendChild(screen);
  setTimeout(() => document.getElementById('newPasswordInput')?.focus(), 100);
}

async function doResetPassword() {
  const newPass = document.getElementById('newPasswordInput')?.value;
  const confirmPass = document.getElementById('confirmPasswordInput')?.value;
  const errorEl = document.getElementById('resetError');

  if (!newPass || newPass.length < 6) {
    errorEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
    errorEl.style.display = 'block'; return;
  }
  if (newPass !== confirmPass) {
    errorEl.textContent = 'As senhas não coincidem.';
    errorEl.style.display = 'block'; return;
  }

  const { error } = await sb.auth.updateUser({ password: newPass });
  if (error) {
    errorEl.textContent = 'Erro ao salvar senha. Tente novamente.';
    errorEl.style.display = 'block'; return;
  }

  document.getElementById('resetScreen')?.remove();
  showToast('✅ Senha alterada com sucesso!');
  initApp();
}

// CALENDAR RENDER

function renderCalendar() {
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  document.getElementById('monthTitle').textContent = `${MONTHS_PT[viewMonth]} ${viewYear}`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();
  const today = new Date();

  let cells = [];
  // Prev month filler
  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: daysInPrev - i, current: false });
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, current: true });
  }
  // Next month filler
  const remaining = 42 - cells.length;
  for (let i = 1; i <= remaining; i++) {
    cells.push({ day: i, current: false });
  }

  cells.forEach(({ day, current }, idx) => {
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (!current ? ' other-month' : '');
    const col = idx % 7;
    if (col === 0 || col === 6) cell.classList.add('weekend');

    const isToday = current &&
      day === today.getDate() &&
      viewMonth === today.getMonth() &&
      viewYear === today.getFullYear();
    if (isToday) cell.classList.add('today');

    const isPast = current && !isToday && (
      viewYear < today.getFullYear() ||
      (viewYear === today.getFullYear() && viewMonth < today.getMonth()) ||
      (viewYear === today.getFullYear() && viewMonth === today.getMonth() && day < today.getDate())
    );
    if (isPast) cell.classList.add('past');

    const dateStr = current
      ? `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`
      : null;

    // Day number
    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = day;
    cell.appendChild(numEl);

    if (current && dateStr) {
      const dayData = calendarData[dateStr];
      const cards = dayData?.cards || [];

      if (cards.length) {
        const postsEl = document.createElement('div');
        postsEl.className = 'day-posts';
        cards.slice(0,3).forEach(card => {
          const chip = document.createElement('div');
          const st = cardStatus(card);
          chip.className = `post-chip ${st}`;
          chip.textContent = card.title;
          chip.title = card.title;
          postsEl.appendChild(chip);
        });
        if (cards.length > 3) {
          const more = document.createElement('div');
          more.className = 'post-chip empty';
          more.textContent = `+${cards.length - 3} mais`;
          postsEl.appendChild(more);
        }
        cell.appendChild(postsEl);
      }

      // Botão + para novo card (agência)
      if (isAgency) {
        const addBtn = document.createElement('button');
        addBtn.className = 'day-add-btn';
        addBtn.title = 'Novo card';
        addBtn.textContent = '+';
        addBtn.addEventListener('click', e => {
          e.stopPropagation();
          openModal(dateStr, day, true);
        });
        cell.appendChild(addBtn);
      }

      cell.addEventListener('click', () => openModal(dateStr, day, false));
    }

    grid.appendChild(cell);
  });

  renderStats();
}

function renderStats() {
  let approved=0, pending=0, rejected=0, total=0;
  Object.values(calendarData).forEach(d => {
    (d.cards||[]).forEach(c => {
      if (c.status === 'empty') return;
      total++;
      if (c.status==='approved') approved++;
      else if (c.status==='pending') pending++;
      else if (c.status==='rejected') rejected++;
    });
  });

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card s-green">
      <div class="stat-icon green">✅</div>
      <div><div class="stat-label">Aprovados</div><div class="stat-value">${approved}</div></div>
    </div>
    <div class="stat-card s-yellow">
      <div class="stat-icon yellow">⏳</div>
      <div><div class="stat-label">Aguardando</div><div class="stat-value">${pending}</div></div>
    </div>
    <div class="stat-card s-red">
      <div class="stat-icon red">❌</div>
      <div><div class="stat-label">Reprovados</div><div class="stat-value">${rejected}</div></div>
    </div>
    <div class="stat-card s-blue">
      <div class="stat-icon blue">📁</div>
      <div><div class="stat-label">Total no mês</div><div class="stat-value">${total}</div></div>
    </div>
  `;
}

function openModal(dateStr, day, autoNewCard=false) {
  selectedDay = dateStr;
  selectedType = null; stagingItems = [];
  const [y, m, d] = dateStr.split('-').map(Number);
  const jsDate = new Date(y, m-1, d);
  const dayOfWeek = DAYS_PT[jsDate.getDay()];
  document.getElementById('modalDate').textContent = `${day} de ${MONTHS_PT[m-1]}`;
  document.getElementById('modalSub').textContent = `${dayOfWeek.charAt(0).toUpperCase()+dayOfWeek.slice(1)}, ${viewYear}`;
  renderModalBody(autoNewCard);
  document.getElementById('overlay').classList.add('open');
}

function renderModalBody(autoNewCard=false) {
  const dayData = getDay(selectedDay);
  const body = document.getElementById('modalBody');
  let html = '';

  if (!isAgency) {
    html += `<div class="client-notice">👁️ Você está visualizando como <strong>cliente</strong>. Revise os conteúdos e aprove ou solicite ajustes.</div>`;
  }

  // Cards existentes
  const cards = dayData.cards || [];
  if (cards.length === 0 && !autoNewCard) {
    html += `<div class="empty-state"><div class="es-icon">📭</div>
      <p>${isAgency ? 'Nenhum card ainda. Clique em + para criar.' : 'Nenhum conteúdo enviado para este dia.'}</p>
    </div>`;
  } else {
    cards.forEach(card => { html += renderCard(card); });
  }

  // Formulário novo card
  if (isAgency) {
    if (autoNewCard || newCardTitle !== '__none__') {
      html += renderNewCardForm(autoNewCard);
    }
  }

  html += `<div class="modal-footer" style="margin-top:8px;justify-content:space-between">
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="showHistory('${selectedDay}')">📋 Histórico</button>
    </div>
    <div style="display:flex;gap:8px">
      ${isAgency && !autoNewCard ? `<button class="btn btn-primary" onclick="showNewCardForm()">+ Novo card</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    </div>
  </div>`;

  body.innerHTML = html;
}

function renderNewCardForm(open=false) {
  if (!open && newCardTitle === '') return '';
  return `<div class="campaign-card status-empty" style="margin-bottom:16px">
    <div class="campaign-header">
      <div style="flex:1">
        <div class="caption-label" style="margin-bottom:5px">Nome do card</div>
        <input class="campaign-title-input" id="newCardTitleInput" style="width:100%"
          placeholder="Ex: Dia Mundial da Água"
          value="${newCardTitle !== '__none__' ? newCardTitle : ''}"
          oninput="newCardTitle=this.value"
          onkeydown="if(event.key==='Enter')confirmNewCard()">
      </div>
    </div>
    <div style="padding:0 16px 16px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="cancelNewCard()">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="confirmNewCard()">Criar card →</button>
    </div>
  </div>`;
}

function showNewCardForm() {
  newCardTitle = '';
  renderModalBody(true);
  setTimeout(() => document.getElementById('newCardTitleInput')?.focus(), 50);
}

function cancelNewCard() {
  newCardTitle = '__none__';
  renderModalBody(false);
}

async function confirmNewCard() {
  const val = (document.getElementById('newCardTitleInput')?.value || newCardTitle).trim();
  if (!val) { showToast('Digite um nome para o card'); return; }
  const card = makeCard(val);
  logHistory(card, 'create', `Criou o card`);
  getDay(selectedDay).cards.push(card);
  newCardTitle = '__none__';
  renderModalBody(false);
  renderCalendar();
  showToast('✅ Card criado!');
  // Salvar no Supabase
  await saveCardToSupabase(card, selectedDay);

function renderCard(card) {
  const st = cardStatus(card);
  const statusLabel = { approved:'Aprovado', pending:'Aguardando', rejected:'Reprovado', empty:'Sem post' };
  const typeLabel = { photo:'Foto', video:'Vídeo', carousel:'Carrossel', image:'Imagem', doc:'Documento' };

  // Comentários
  const commentHtml = (card.comments||[]).map((c,i) => {
    const text   = typeof c==='object'?c.text:c;
    const author = typeof c==='object'?c.author:'Usuário';
    const date   = typeof c==='object'?c.date:'';
    const time   = typeof c==='object'?c.time:'';
    return `<div class="comment-row">
      <div style="flex:1">
        <div class="comment-author">${author} <span>${date} às ${time}</span></div>
        <div class="comment-bubble">💬 ${text}</div>
      </div>
      <button class="comment-del" onclick="deleteCardComment('${card.id}',${i})" title="Excluir">✕</button>
    </div>`;
  }).join('');

  // Área do post
  let postHtml = '';
  if (!card.post) {
    // Sem post — mostrar upload (agência) ou vazio (cliente)
    if (isAgency) {
      const types = [
        { id:'photo', icon:'🖼️', label:'Foto', accept:'image/*' },
        { id:'video', icon:'🎬', label:'Vídeo', accept:'video/*' },
        { id:'carousel', icon:'🎠', label:'Carrossel', accept:'image/*,video/*' },
      ];
      const cType = selectedType && selectedType.startsWith('card:'+card.id) ? selectedType.split(':')[2] : null;
      let uploadInner = '';
      if (!cType) {
        uploadInner = `<div class="card-type-selector">` +
          types.map(t=>`<button class="type-btn btn-sm" onclick="selectCardType('${card.id}','${t.id}')">${t.icon} ${t.label}</button>`).join('') +
        `</div><div style="font-size:11px;color:var(--ink-lighter)">Selecione o tipo para fazer upload</div>`;
      } else if (cType === 'carousel') {
        uploadInner = renderStagingArea(card.id);
      } else {
        const t = types.find(x=>x.id===cType);
        uploadInner = `<label style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="font-size:24px">${t.icon}</div>
          <div style="font-size:12px;font-weight:600;color:var(--accent)">Clique para selecionar</div>
          <div style="font-size:11px;color:var(--ink-lighter)">${cType==='photo'?'JPG, PNG, WebP':'MP4, MOV'}</div>
          <input type="file" style="display:none" accept="${t.accept}" onchange="handleCardFile('${card.id}',this.files)">
        </label>`;
      }
      postHtml = `<div class="card-upload-zone"><div class="card-upload-inner">${uploadInner}</div></div>`;
    } else {
      postHtml = `<div style="padding:16px;text-align:center;font-size:12px;color:var(--ink-lighter)">Nenhum arquivo enviado ainda.</div>`;
    }
  } else {
    // Com post — mostrar thumb + info
    const p = card.post;
    let thumbContent = '';
    let thumbClass = 'card-post-thumb';
    if (p.src && p.type==='photo') {
      thumbContent = `<img src="${p.src}" style="width:100%;height:100%;object-fit:cover;">`;
      thumbClass += ' has-preview';
    } else if (p.src && p.type==='video') {
      thumbContent = `<video src="${p.src}" style="width:100%;height:100%;object-fit:cover;" muted></video>`;
      thumbClass += ' has-preview';
    } else if (p.type==='carousel' && p.items?.length) {
      // Strip do carrossel
      const strip = p.items.slice(0,3).map((item,i) => {
        let inner = item.src && item.fileType==='image'
          ? `<img src="${item.src}" style="width:100%;height:100%;object-fit:cover;">`
          : item.src && item.fileType==='video'
          ? `<video src="${item.src}" style="width:100%;height:100%;object-fit:cover;" muted></video>`
          : `<div style="font-size:18px;display:flex;align-items:center;justify-content:center;height:100%">${item.emoji}</div>`;
        return `<div class="carousel-strip-thumb" onclick="openCardCarouselPreview('${card.id}',${i})" style="width:50px;height:50px;border-radius:6px;overflow:hidden;flex-shrink:0;cursor:zoom-in">${inner}</div>`;
      }).join('');
      postHtml = `<div class="card-post-inner">
        <div style="display:flex;gap:4px;overflow-x:auto;flex:1">${strip}${p.items.length>3?`<div style="width:50px;height:50px;border-radius:6px;background:var(--stone);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--ink-lighter);flex-shrink:0">+${p.items.length-3}</div>`:''}</div>

          <div class="card-post-meta">Carrossel · ${p.items.length} itens</div>

        </div>
      </div>`;
      thumbContent = null;
    } else {
      thumbContent = `<span>${p.emoji||'📄'}</span>`;
    }

    if (thumbContent !== null) {
      postHtml = `<div class="card-post-inner">
        <div class="${thumbClass}" onclick="${(p.src)?`openCardPreview('${card.id}')`:''}">
          ${thumbContent}
        </div>
        <div class="card-post-info">
          <div class="card-post-name">${p.name}</div>
          <div class="card-post-meta">${typeLabel[p.type]||p.type}</div>

          ${isAgency ? `<button class="btn btn-ghost btn-sm" onclick="removeCardPost('${card.id}')">🗑</button>` : ''}
        </div>
      </div>`;
    }
  }

  // Ações de aprovação (cliente)
  let approvalHtml = '';
  if (!isAgency && card.post) {
    approvalHtml = `<div style="display:flex;gap:8px;padding:0 12px 12px;justify-content:flex-end">
      <button class="btn btn-approve btn-sm ${st==='approved'?'active':''}" onclick="setCardStatus('${card.id}','approved')">✓ Aprovar</button>
      <button class="btn btn-reject btn-sm ${st==='rejected'?'active':''}" onclick="setCardStatus('${card.id}','rejected')">✗ Reprovar</button>
    </div>`;
  }

  // Footer agência
  let footerHtml = '';
  if (isAgency) {
    if (card.saved) {
      footerHtml = `<div class="card-footer">
        <button class="btn-delete-card" onclick="deleteCard('${card.id}')">🗑 Excluir</button>
        <button class="btn-alter-card" onclick="alterCard('${card.id}')">✏️ Alterar</button>

      </div>`;
    } else {
      footerHtml = `<div class="card-footer">
        <button class="btn-delete-card" onclick="deleteCard('${card.id}')">🗑 Excluir</button>
        <button class="btn-save-card" onclick="saveCard('${card.id}')">💾 Salvar card</button>
      </div>`;
    }
  }

  return `<div class="campaign-card status-${st}${card.saved?' saved':''}" id="card-${card.id}">

      <div class="campaign-title-row">
        ${isAgency
          ? `<div class="campaign-title" id="ctitle-${card.id}"
              onclick="if(!${card.saved})startCardRename('${card.id}')"
              title="${card.saved ? 'Clique em Alterar para editar' : 'Clique para renomear'}"
              style="${card.saved ? 'cursor:default;opacity:0.75' : ''}">${card.title}</div>`
          : `<div class="campaign-title" style="cursor:default">${card.title}</div>`
        }
        ${st!=='empty' ? `<span class="status-badge ${st}" style="flex-shrink:0">${statusLabel[st]}</span>` : ''}
      </div>
    </div>
    <div class="campaign-body">
      <div class="caption-label">Legenda</div>
      ${isAgency
        ? `<textarea class="caption-textarea" id="caption-${card.id}" placeholder="Escreva a legenda do post..." onblur="saveCaption('${card.id}')" ${card.saved?'disabled style="opacity:0.7;cursor:not-allowed"':''}>${card.caption}</textarea>`
        : `<div class="caption-display${!card.caption?' empty':''}">${card.caption||'Sem legenda'}</div>`
      }
      <div class="card-post-area ${card.post?'has-post':''}">${postHtml}</div>
      ${commentHtml ? `<div class="card-comments">${commentHtml}</div>` : ''}
      <div class="comment-send-row" style="padding:8px 0 0">
        <textarea class="comment-area" id="comment-${card.id}" placeholder="Escreva um comentário..." rows="2"></textarea>
        <button class="btn-send-comment" onclick="sendCardComment('${card.id}')">Enviar</button>
      </div>
      ${approvalHtml}
    </div>
    ${footerHtml}
  </div>`;
}

function renderStagingArea(cardId) {
  let html = `<div style="width:100%">
    <div class="staging-title">📋 Itens do carrossel — arraste para reordenar</div>
    <div class="staging-thumbs" style="min-height:60px">`;
  if (stagingItems.length===0) {
    html += `<div style="font-size:11px;color:var(--ink-lighter);padding:6px 0">Nenhum arquivo. Adicione abaixo.</div>`;
  } else {
    stagingItems.forEach((item,i) => {
      html += `<div class="staging-thumb" draggable="true"
        ondragstart="stagingDragStart(event,${i})"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="stagingDrop(event,${i})">`;
      if (item.src && item.fileType==='image') html += `<img src="${item.src}">`;
      else if (item.src && item.fileType==='video') html += `<video src="${item.src}" muted></video>`;

      html += `<div class="st-order">${i+1}</div><button class="st-remove" onclick="removeStagingItem(${i})">✕</button></div>`;
    });
  }
  html += `</div><div class="staging-actions">
    <label class="btn btn-ghost btn-sm" style="cursor:pointer">+ Adicionar
      <input type="file" style="display:none" multiple accept="image/*,video/*" onchange="addToStaging(this.files)">
    </label>
    ${stagingItems.length>0 ? `<button class="btn btn-primary btn-sm" onclick="saveCardCarousel('${cardId}')">💾 Salvar (${stagingItems.length})</button>` : ''}
  </div></div>`;
  return html;
}

  const commentBox = `<div class="comment-send-row">
    <textarea class="comment-area" id="comment-${post.id}" placeholder="Escreva um comentário..." rows="2"></textarea>
    <button class="btn-send-comment" onclick="sendComment('${post.id}')">Enviar</button>
  </div>`;

  const isCarousel = post.type === 'carousel';

  if (isCarousel && post.items) {
    // ── CARD DE CARROSSEL ──
    let stripHtml = post.items.map((item, i) => {
      let inner = '';
      if (item.src && item.fileType === 'image') inner = `<img src="${item.src}">`;
      else if (item.src && item.fileType === 'video') inner = `<video src="${item.src}" muted></video>`;
      else inner = `<div class="cs-emoji">${item.emoji}</div>`;
      return `<div class="carousel-strip-thumb" onclick="openCarouselPreview('${post.id}',${i})" title="Ver item ${i+1}">${inner}</div>`;
    }).join('');

    return `<div class="content-item carousel-card" id="item-${post.id}" style="flex-direction:column;padding:0;gap:0">
      <div class="carousel-strip">${stripHtml}</div>
      <div class="carousel-info" style="display:flex;align-items:flex-start;gap:12px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <div class="post-name-wrap" id="name-wrap-${post.id}">
              ${isAgency
                ? `<div class="post-name-display" id="name-display-${post.id}" onclick="startRename('${post.id}')" title="Clique para renomear">${post.name}</div>`
                : `<div class="content-name">${post.name}</div>`
              }
            </div>
          </div>
          <div class="content-meta">${typeLabel[post.type]||post.type} · ${post.items.length} itens</div>
          ${post.caption ? `<div class="content-caption">${post.caption}</div>` : ''}
          ${commentHtml}
          ${commentBox}
        </div>
        <div class="content-actions" style="flex-direction:column;align-items:flex-end;gap:6px;padding-top:2px">
          <span class="status-badge ${post.status}">${statusLabel[post.status]}</span>
          ${actionsHtml}
        </div>
      </div>
    </div>`;
  }

  // ── CARD SIMPLES (foto / vídeo / doc) ──
  let thumbHtml = '';
  if (post.src && post.type === 'image' || post.src && post.type === 'photo') {
    thumbHtml = `<div class="content-thumb has-preview" onclick="openPreview('${post.id}')" title="Ver preview">
      <img src="${post.src}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">
    </div>`;
  } else if (post.src && post.type === 'video') {
    thumbHtml = `<div class="content-thumb has-preview" onclick="openPreview('${post.id}')" title="Ver preview">
      <video src="${post.src}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" muted></video>
    </div>`;
  } else {
    const emoji = post.type==='photo'?'🖼️':post.type==='video'?'🎬':post.emoji||'📄';
    thumbHtml = `<div class="content-thumb">${emoji}</div>`;
  }

  return `<div class="content-item" id="item-${post.id}">
    ${thumbHtml}
    <div class="content-info">
      <div class="post-name-wrap" id="name-wrap-${post.id}">
        ${isAgency
          ? `<div class="post-name-display" id="name-display-${post.id}" onclick="startRename('${post.id}')" title="Clique para renomear">${post.name}</div>`
          : `<div class="content-name">${post.name}</div>`
        }
      </div>
      <div class="content-meta">${typeLabel[post.type]||post.type}</div>
      ${post.caption ? `<div class="content-caption">${post.caption}</div>` : ''}
      ${commentHtml}
      ${commentBox}
    </div>
    <div class="content-actions">
      <span class="status-badge ${post.status}">${statusLabel[post.status]}</span>
      ${actionsHtml}
    </div>
  </div>`;
}
